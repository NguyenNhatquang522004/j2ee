# =============================================
server.port=${SERVER_PORT:8080}
# APPLICATION CONFIG - Website Thực Phẩm Sạch
# =============================================
spring.application.name=clean-food-ecommerce
spring.profiles.active=local

# =============================================
# DATABASE CONFIG (MySQL)
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clean_food_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE CONFIG
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT SECURITY CONFIG
# =============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# =============================================
# MAIL CONFIG (Gmail SMTP fallback for local, MailHog for production/docker)
# =============================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:thanhtoan06092004@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-name=FreshFood
app.mail.from-address=noreply@freshFood.com

# =============================================
# AI API CONFIG (Mock / External)
# =============================================
app.ai.api.url=http://localhost:5001/api/predict-freshness
app.ai.api.timeout=10000

# =============================================
# BATCH MANAGEMENT CONFIG
# =============================================
app.batch.expiry-warning-days=3
app.sepay.token=${SEPAY_TOKEN}

# =============================================
# FILE UPLOAD CONFIG
# =============================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# =============================================
# CLOUDINARY CONFIG
# =============================================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# =============================================
# SWAGGER / OPENAPI CONFIG
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# SCHEDULING
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# REDIS CONFIG
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# =============================================
# SENTRY CONFIG
# =============================================
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=1.0
sentry.exception-resolver-order=-2147483648

# =============================================
# LOGGING
# =============================================
logging.level.nhom5.demo=DEBUG
logging.register-shutdown-hook=true
# Use standard pattern by default, logback-spring.xml handles JSON in prod profile
logging.level.org.springframework.security=DEBUG

# =============================================
# ACTUATOR / MONITORING
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
