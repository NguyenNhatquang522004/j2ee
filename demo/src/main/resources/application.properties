# =============================================
server.port=${SERVER_PORT:8080}
# APPLICATION CONFIG - Website Thực Phẩm Sạch
# =============================================
spring.application.name=clean-food-ecommerce
spring.profiles.active=local
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# =============================================
# DATABASE CONFIG (MySQL)
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clean_food_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# TIMEZONE & ENCODING CONFIG
# =============================================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =============================================
# JPA / HIBERNATE CONFIG
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# FLYWAY CONFIG (Database Migration)
# =============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =============================================
# JWT SECURITY CONFIG
# =============================================
app.jwt.secret=${JWT_SECRET:freshfood_super_secret_master_key_123_at_least_256_bits}
app.jwt.expiration=86400000
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

# =============================================
# MAIL CONFIG (Gmail SMTP fallback for local, MailHog for production/docker)
# =============================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:admin@freshfood.com}
spring.mail.password=${MAIL_PASSWORD:demo_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-name=FreshFood
app.mail.from-address=noreply@freshFood.com

# =============================================
# AI API CONFIG (Mock / External)
# =============================================
app.ai.api.url=http://localhost:5001/api/predict-freshness
app.ai.api.timeout=10000

# =============================================
# BATCH MANAGEMENT CONFIG
# =============================================
app.batch.expiry-warning-days=3
app.sepay.token=${SEPAY_TOKEN:DEMO_SEPAY_TOKEN}
# =============================================
# VNPAY PAYMENT CONFIG
# =============================================
app.vnpay.tmn-code=${VNPAY_TMN_CODE:DEMO_TMN_CODE}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:DEMO_HASH_SECRET}
app.vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment/vnpay-callback}

# =============================================
# FILE UPLOAD CONFIG
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# CLOUDINARY CONFIG
# =============================================
cloudinary.cloud-name=${CLOUDINARY_NAME:demo_cloud_name}
cloudinary.api-key=${CLOUDINARY_KEY:demo_api_key}
cloudinary.api-secret=${CLOUDINARY_SECRET:demo_api_secret}

# =============================================
# SWAGGER / OPENAPI CONFIG
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# SCHEDULING
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# REDIS CONFIG
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# =============================================
# SENTRY CONFIG
# =============================================
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=1.0
sentry.exception-resolver-order=-2147483648

# =============================================
# LOGGING
# =============================================
logging.level.nhom5.demo=${LOG_LEVEL:INFO}
logging.register-shutdown-hook=true
# Use standard pattern by default, logback-spring.xml handles JSON in prod profile
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# =============================================
# ACTUATOR / MONITORING
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# =============================================
# MEILISEARCH CONFIG
# =============================================
app.meili.host=${MEILI_SERVER_URL:http://localhost:7700}
app.meili.apiKey=${MEILI_API_KEY}
app.meili.index.products=products
